name: Deploy AGRO PIPES

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-web:
    name: Web to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build
        working-directory: web
        run: npm install && VITE_API_URL=https://agro-pipes-api.onrender.com/api VITE_BASE_URL=/agro-pipes-suite/ npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web/dist
          force_orphan: true

  deploy-render:
    name: API to Render
    runs-on: ubuntu-latest
    needs: deploy-web
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          if [ -z "$RENDER_KEY" ]; then
            echo "RENDER_API_KEY not set - skipping"
            exit 0
          fi
          echo "Triggering Render deploy..."
          curl -sf -H "Authorization: Bearer $RENDER_KEY" \
            "https://api.render.com/v1/services?limit=20" \
            -o /tmp/services.json
          cat /tmp/services.json | grep -o '"id":"[^"]*"' | head -10
