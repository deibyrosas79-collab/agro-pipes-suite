name: Deploy AGRO PIPES

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-web:
    name: Web → GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: web
        run: npm install

      - name: Build web app
        working-directory: web
        env:
          VITE_API_URL: https://agro-pipes-api.onrender.com/api
          VITE_BASE_URL: /agro-pipes-suite/
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web/dist
          force_orphan: true

  deploy-render:
    name: API → Render
    runs-on: ubuntu-latest
    needs: deploy-web
    env:
      RENDER_KEY: ${{ secrets.RENDER_API_KEY }}
    steps:
      - name: Skip if no Render key
        if: ${{ env.RENDER_KEY == '' }}
        run: echo "RENDER_API_KEY secret not configured — skipping Render deploy"

      - name: Trigger Render deploy
        if: ${{ env.RENDER_KEY != '' }}
        run: |
          echo "Fetching Render services..."
          RESP=$(curl -sf \
            -H "Authorization: Bearer $RENDER_KEY" \
            "https://api.render.com/v1/services?limit=20")
          echo "$RESP" | python3 -c "
import json, sys, subprocess, os
key = os.environ['RENDER_KEY']
items = json.load(sys.stdin)
deployed = 0
for item in items:
    srv = item.get('service', item)
    sid = srv.get('id','')
    name = srv.get('name','')
    if sid and 'agro-pipes' in name:
        print(f'Deploying {name} ({sid})...')
        r = subprocess.run(['curl','-sf','-X','POST',
            '-H', f'Authorization: Bearer {key}',
            f'https://api.render.com/v1/services/{sid}/deploys'],
            capture_output=True, text=True)
        print(r.stdout[:200] or r.stderr[:200])
        deployed += 1
if deployed == 0:
    print('No agro-pipes services found in Render account')
"
