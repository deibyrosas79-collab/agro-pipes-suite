name: Deploy AGRO PIPES

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ─── Deploy Web Frontend to GitHub Pages ────────────────────────────────────
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build web frontend
        working-directory: web
        env:
          VITE_API_URL: https://agro-pipes-api.onrender.com/api
          VITE_BASE_URL: /agro-pipes-suite/
        run: |
          npm install
          VITE_BASE_URL=/agro-pipes-suite/ npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web/dist
          force_orphan: true

  # ─── Deploy Backend to Render ───────────────────────────────────────────────
  deploy-render:
    runs-on: ubuntu-latest
    if: ${{ secrets.RENDER_API_KEY != '' }}
    steps:
      - name: Trigger Render deploys
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          # Get all services and deploy the agro-pipes ones
          SERVICES=$(curl -sf \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services?limit=20" || echo "[]")

          echo "$SERVICES" | python3 - << 'PYEOF'
          import json, sys, subprocess, os
          data = json.loads(sys.stdin.read())
          key = os.environ['RENDER_API_KEY']
          for item in data:
            srv = item.get('service', item)
            sid = srv.get('id', '')
            name = srv.get('name', '')
            if sid and 'agro-pipes' in name:
              print(f"Deploying: {name} ({sid})")
              r = subprocess.run([
                'curl', '-sf', '-X', 'POST',
                '-H', f'Authorization: Bearer {key}',
                '-H', 'Content-Type: application/json',
                f'https://api.render.com/v1/services/{sid}/deploys'
              ], capture_output=True, text=True)
              print(r.stdout[:300] or r.stderr[:200])
          PYEOF
