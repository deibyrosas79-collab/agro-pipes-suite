services:
  - type: web
    name: agro-pipes-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()" --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: agro-pipes-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://agro-pipes-web.onrender.com,http://localhost:5173
      - key: TOKEN_MAX_AGE
        value: "43200"

  - type: web
    name: agro-pipes-web
    runtime: node
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_URL
        value: https://agro-pipes-api.onrender.com/api

databases:
  - name: agro-pipes-db
    databaseName: agropipes
    user: agropipes
    plan: free
